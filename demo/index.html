<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111110" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Content Security Policy se inyecta vía vite plugin (cspPlugin) según modo dev/prod -->
    <!-- Las tipografías (Inter / JetBrains Mono) se auto-hostean vía
         @fontsource y se importan en src/main.jsx. Sin third-party fetches. -->
    <!-- Frame-buster: evita que GitHub Pages (u otro hosting estático sin
         headers HTTP) sea embebido en un iframe malicioso. -->
    <script>
      if (window.top !== window.self) window.top.location = window.self.location;
    </script>

    <title>Melanoma AI — Detección de lesiones cutáneas con deep learning</title>
    <meta
      name="description"
      content="Sube una imagen dermatoscópica y la IA la analiza en tu navegador. Modelo VGG16 + fine-tuning (AUC 0.9606). 100% local, tu imagen nunca sale de tu dispositivo."
    />

    <!-- Open Graph. URLs absolutas (los crawlers no resuelven relativas). -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://abarriuso.github.io/melanoma-detection-vgg16/" />
    <meta property="og:title" content="Melanoma AI — Clasificación de lesiones cutáneas" />
    <meta
      property="og:description"
      content="IA que analiza lesiones cutáneas directo en tu navegador. VGG16 + fine-tuning, AUC 0.9606, inferencia 100% local con TensorFlow.js."
    />
    <meta property="og:image" content="https://abarriuso.github.io/melanoma-detection-vgg16/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"       content="Resumen del proyecto: AUC 0.9606, accuracy 88.8%, sensibilidad 87.8%." />
    <meta property="og:locale" content="es_ES" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Melanoma AI — Detección de lesiones cutáneas" />
    <meta
      name="twitter:description"
      content="IA que analiza lesiones cutáneas en tu navegador. VGG16, AUC 0.9606, 100% local."
    />
    <meta name="twitter:image" content="https://abarriuso.github.io/melanoma-detection-vgg16/og.png" />

    <!-- JSON-LD: enriquece la tarjeta en buscadores y agregadores que
         entienden Schema.org. Sin coste para usuarios que no lo consumen. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Melanoma AI — Detección de lesiones cutáneas",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web Browser",
        "description": "Proyecto educativo de clasificación de lesiones cutáneas con deep learning (VGG16 + fine-tuning). Inferencia 100% client-side con TensorFlow.js. No es un dispositivo médico.",
        "url": "https://abarriuso.github.io/melanoma-detection-vgg16/",
        "image": "https://abarriuso.github.io/melanoma-detection-vgg16/og.png",
        "inLanguage": "es",
        "isAccessibleForFree": true,
        "author": {
          "@type": "Organization",
          "name": "melanoma-detection-vgg16",
          "url": "https://github.com/abarriuso"
        },
        "disclaimers": [
          "Este es un proyecto académico y no constituye un dispositivo médico.",
          "No está diseñado para proporcionar diagnósticos médicos ni consejos de tratamiento.",
          "Consulta siempre a un profesional sanitario cualificado."
        ],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR",
          "description": "Proyecto educativo gratuito"
        }
      }
    </script>

    <div id="root"></div>

      <div style="max-width:560px;margin:3rem auto;padding:1.5rem;color:#e6edf3;background:#1c2128;border:1px solid #30363d;border-radius:10px;font-family:system-ui,sans-serif;text-align:center">

        <p>El modelo se ejecuta <strong>directamente en tu navegador</strong> para que tu imagen nunca salga de tu dispositivo.</p>
        <p>Actívalo o consulta el código en
          <a style="color:#f0b654" href="https://github.com/abarriuso/melanoma-detection-vgg16">GitHub</a>.
        </p>
